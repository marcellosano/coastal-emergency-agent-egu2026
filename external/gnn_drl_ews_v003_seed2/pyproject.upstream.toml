[project]
name = "gnn_drl_ews"
version = "0.1.0"
description = "Plan-Conditioned Graph Reinforcement Learning for Emergency Warning Systems"
authors = [{ name = "Marcello Sano", email = "marcellosano@gmail.com" }]
requires-python = ">=3.10"
dependencies = [
    "torch>=2.2",
    "torch-geometric>=2.5",
    "numpy>=1.26",
    "pyyaml>=6.0",
    "gymnasium>=0.29",
    "matplotlib>=3.8",
]

[project.optional-dependencies]
real = [
    "osmnx>=1.9",
    "geopandas>=0.14",
    "rasterio>=1.3",
    "scikit-learn>=1.4",   # KMeans clustering of OSM building centroids in data/osm.py
]
dev = [
    "pytest>=8.0",
    "ruff>=0.4",
]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
